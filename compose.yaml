services:
  dev:
    image: rust:1.88-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/target
    ports:
      - "8000:8000"
    command: /usr/local/cargo/bin/cargo test --locked

  checks:
    image: rust:1.88-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/target
    command: sh -lc "/usr/local/cargo/bin/cargo test --locked && sh scripts/security_check.sh"

volumes:
  cargo-cache:
  target-cache:
